<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #eef2ff;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-50); color: var(--gray-900); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  #sidebar { width: var(--sidebar-w); background: #1e1b4b; color: #c7d2fe; display: flex; flex-direction: column; flex-shrink: 0; }
  #sidebar .logo { padding: 20px 16px; font-size: 1.2rem; font-weight: 700; color: #fff; border-bottom: 1px solid #312e81; display: flex; align-items: center; gap: 8px; }
  #sidebar .logo span { font-size: 1.4rem; }
  #sidebar nav { flex: 1; padding: 12px 0; }
  #sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; font-size: 0.875rem; color: #a5b4fc; transition: background .15s; border-left: 3px solid transparent; }
  #sidebar nav a:hover { background: #312e81; color: #fff; }
  #sidebar nav a.active { background: #312e81; color: #fff; border-left-color: #818cf8; }
  #sidebar nav a .icon { font-size: 1.1rem; width: 20px; text-align: center; }
  #sidebar .footer { padding: 16px; font-size: 0.75rem; color: #6366f1; border-top: 1px solid #312e81; }

  /* MAIN */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #topbar h1 { font-size: 1.1rem; font-weight: 600; }
  #topbar .actions { display: flex; gap: 8px; }
  #content { flex: 1; overflow-y: auto; padding: 24px; }

  /* CARDS / KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid var(--gray-200); }
  .kpi-card .label { font-size: 0.75rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .kpi-card .value { font-size: 1.75rem; font-weight: 700; }
  .kpi-card .sub { font-size: 0.75rem; color: var(--gray-400); margin-top: 4px; }
  .kpi-card.green .value { color: var(--success); }
  .kpi-card.amber .value { color: var(--warning); }
  .kpi-card.red .value { color: var(--danger); }
  .kpi-card.indigo .value { color: var(--primary); }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid var(--gray-200); }
  .chart-card h3 { font-size: 0.875rem; font-weight: 600; margin-bottom: 16px; color: var(--gray-700); }
  .chart-wrap { position: relative; height: 200px; }

  /* TABLE */
  .table-card { background: #fff; border-radius: 10px; border: 1px solid var(--gray-200); overflow: hidden; }
  .table-toolbar { padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--gray-200); flex-wrap: wrap; }
  .table-toolbar input, .table-toolbar select { border: 1px solid var(--gray-300); border-radius: 6px; padding: 6px 10px; font-size: 0.8rem; background: #fff; outline: none; }
  .table-toolbar input:focus, .table-toolbar select:focus { border-color: var(--primary); }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead tr { background: var(--gray-50); }
  th { padding: 10px 14px; text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--gray-500); border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  tr:hover td { background: var(--gray-50); }
  tr:last-child td { border-bottom: none; }
  .no-data { text-align: center; color: var(--gray-400); padding: 40px; font-size: 0.875rem; }
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--gray-200); font-size: 0.8rem; color: var(--gray-500); }
  .pagination button { border: 1px solid var(--gray-300); background: #fff; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
  .pagination button:disabled { opacity: .4; cursor: default; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 0.82rem; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-300); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 0.75rem; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .badge-paid { background: #d1fae5; color: #065f46; }
  .badge-unpaid { background: #fef3c7; color: #92400e; }
  .badge-sent { background: #dbeafe; color: #1e40af; }
  .badge-overdue { background: #fee2e2; color: #991b1b; }
  .badge-draft { background: var(--gray-100); color: var(--gray-700); }
  .badge-cancelled { background: var(--gray-200); color: var(--gray-500); }
  .badge-pending_approval { background: #fef3c7; color: #78350f; }
  .badge-approved { background: #d1fae5; color: #065f46; }
  .badge-rejected { background: #fee2e2; color: #991b1b; }

  /* COLOR DOT */
  .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal { background: #fff; border-radius: 12px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 1; }
  .modal-header h2 { font-size: 1rem; font-weight: 600; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; justify-content: flex-end; background: var(--gray-50); border-radius: 0 0 12px 12px; }
  .close-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray-400); line-height: 1; padding: 2px; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.78rem; font-weight: 500; color: var(--gray-700); }
  input[type=text], input[type=date], input[type=number], input[type=email], select, textarea {
    border: 1px solid var(--gray-300); border-radius: 7px; padding: 8px 10px; font-size: 0.82rem; width: 100%; outline: none; background: #fff; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
  textarea { resize: vertical; min-height: 72px; }
  input[type=color] { height: 36px; padding: 2px 4px; cursor: pointer; border-radius: 7px; }
  .section-title { font-size: 0.75rem; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .06em; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--gray-200); }

  /* PRICING TABLE IN MODAL */
  .pricing-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .pricing-table th { padding: 7px 10px; text-align: left; font-size: 0.72rem; text-transform: uppercase; color: var(--gray-500); background: var(--gray-50); border: 1px solid var(--gray-200); }
  .pricing-table td { padding: 7px 10px; border: 1px solid var(--gray-200); }
  .pricing-table tfoot td { font-weight: 700; background: var(--gray-50); }
  .pricing-table input[type=number] { border: none; padding: 4px; font-size: 0.82rem; width: 120px; }
  .pricing-table input[type=number]:focus { outline: 2px solid var(--primary); border-radius: 4px; }

  /* INVOICE GENERATOR */
  .gen-project-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 280px; overflow-y: auto; }
  .gen-project-card { border: 2px solid var(--gray-200); border-radius: 8px; padding: 12px; cursor: pointer; transition: all .15s; position: relative; }
  .gen-project-card:hover { border-color: var(--primary); background: var(--primary-light); }
  .gen-project-card.selected { border-color: var(--primary); background: var(--primary-light); }
  .gen-project-card input[type=radio] { position: absolute; top: 10px; right: 10px; accent-color: var(--primary); width: 16px; height: 16px; }
  .gen-project-card .proj-name { font-weight: 600; font-size: 0.875rem; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .gen-project-card .proj-meta { font-size: 0.75rem; color: var(--gray-500); }

  .service-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .service-check { display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--gray-200); border-radius: 7px; padding: 8px 12px; font-size: 0.82rem; }
  .service-check label { display: flex; align-items: center; gap: 8px; cursor: pointer; flex: 1; }
  .service-check input[type=checkbox] { accent-color: var(--primary); width: 15px; height: 15px; }
  .service-check .svc-amount { font-weight: 600; color: var(--gray-700); white-space: nowrap; }
  .invoice-total-bar { background: var(--primary-light); border: 1px solid #c7d2fe; border-radius: 8px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .invoice-total-bar .total-label { font-size: 0.875rem; color: var(--primary); font-weight: 600; }
  .invoice-total-bar .total-amount { font-size: 1.4rem; font-weight: 700; color: var(--primary); }

  /* PDF INVOICE STYLES (print/export) */
  #pdf-invoice { display: none; }
  @media print {
    body > * { display: none !important; }
    #pdf-invoice { display: block !important; }
  }

  /* REPORTS DATE RANGE */
  .date-range { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; }
  .date-range span { color: var(--gray-400); }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #1e1b4b; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 0.82rem; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
  #toast.show { opacity: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo"><span>💼</span> Invoice Hub</div>
  <nav>
    <a class="active" data-view="dashboard"><span class="icon">📊</span> Dashboard</a>
    <a data-view="invoices"><span class="icon">🧾</span> Invoices</a>
    <a data-view="projects"><span class="icon">📁</span> Projects</a>
    <a data-view="reports"><span class="icon">📈</span> Reports</a>
    <a data-view="help"><span class="icon">❓</span> Help & Guide</a>
  </nav>
  <div class="footer">Fountayn · Invoice Hub</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <h1 id="view-title">Dashboard</h1>
    <div class="actions" id="topbar-actions"></div>
  </div>
  <div id="content"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- PDF INVOICE (hidden, used for print) -->
<div id="pdf-invoice"></div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────────────────
const SB_URL = 'https://qlzoyqhsvqtxjvppvymj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsem95cWhzdnF0eGp2cHB2eW1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjA2MDMsImV4cCI6MjA5NTY5NjYwM30.hLiEXzj6WqyiVI0xuJVddS55Oyps9K7L2_MCKpGZC44';
const sb = supabase.createClient(SB_URL, SB_KEY);

// ── EMAILJS ───────────────────────────────────────────────────────────────────
const EJS_SERVICE   = 'service_5jlgxlf';
const EJS_PUBLIC    = '3IVETYVu63K2Ww6sm';
const EJS_APPROVAL_TEMPLATE = 'template_approval';   // replace after creating in EmailJS
const EJS_CLIENT_TEMPLATE   = 'template_client';     // replace after creating in EmailJS
const APP_URL = 'https://invoice-hub-umber.vercel.app';
emailjs.init(EJS_PUBLIC);

// ── STATE ─────────────────────────────────────────────────────────────────────
let invoices = [], projects = [], lineItems = [];
let currentView = 'dashboard';
let charts = {};

// Invoice filters
let invSearch='', invStatus='', invProject='', invDateFrom='', invDateTo='';
let invPage = 1; const PAGE_SIZE = 20;

// Report filters
let repSearch='', repStatus='', repProject='', repDateFrom='', repDateTo='';
let repPage = 1;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = (n) => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtDate = (d) => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : '—';
const fmtNum = (n) => n == null ? 0 : Number(n);

function toast(msg, ms=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function statusBadge(s) {
  const labels = { pending_approval:'Pending Approval', approved:'Approved', rejected:'Rejected',
    draft:'Draft', sent:'Sent', paid:'Paid', overdue:'Overdue', cancelled:'Cancelled' };
  return `<span class="badge badge-${s||'draft'}">${labels[s]||s||'draft'}</span>`;
}

function genToken() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

function generateInvoiceNumber() {
  const y = new Date().getFullYear();
  const m = String(new Date().getMonth()+1).padStart(2,'0');
  const existing = invoices.filter(i => i.invoice_number && i.invoice_number.startsWith(`INV-${y}${m}`));
  const seq = String(existing.length + 1).padStart(3,'0');
  return `INV-${y}${m}-${seq}`;
}

function projectName(id) {
  const p = projects.find(x => x.id === id);
  return p ? p.name : '—';
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadAll() {
  const [pRes, iRes, lRes] = await Promise.all([
    sb.from('inv_projects').select('*').order('created_at', {ascending:false}),
    sb.from('inv_invoices').select('*').order('date_invoiced', {ascending:false}),
    sb.from('inv_line_items').select('*'),
  ]);
  projects = pRes.data || [];
  invoices = iRes.data || [];
  lineItems = lRes.data || [];
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
document.getElementById('sidebar').addEventListener('click', e => {
  const a = e.target.closest('a[data-view]');
  if (!a) return;
  document.querySelectorAll('#sidebar nav a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  currentView = a.dataset.view;
  renderView();
});

async function renderView() {
  await loadAll();
  const titles = {dashboard:'Dashboard', invoices:'Invoices', projects:'Projects', reports:'Reports', help:'Help & Guide'};
  document.getElementById('view-title').textContent = titles[currentView] || '';
  const acts = document.getElementById('topbar-actions');
  acts.innerHTML = '';

  const c = document.getElementById('content');
  if (currentView === 'dashboard') { renderDashboard(c); }
  else if (currentView === 'invoices') { renderInvoices(c, acts); }
  else if (currentView === 'projects') { renderProjects(c, acts); }
  else if (currentView === 'reports') { renderReports(c, acts); }
  else if (currentView === 'help') { renderHelp(c); }
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(c) {
  const totalInvoiced = invoices.reduce((s,i) => s + fmtNum(i.invoice_amount), 0);
  const totalPaid = invoices.filter(i => i.status === 'paid').reduce((s,i) => s + fmtNum(i.invoice_amount), 0);
  const outstanding = invoices.filter(i => !['paid','cancelled'].includes(i.status)).reduce((s,i) => s + fmtNum(i.invoice_amount), 0);
  const overdue = invoices.filter(i => {
    if (i.status === 'paid' || i.status === 'cancelled') return false;
    if (!i.date_invoiced) return false;
    const due = new Date(i.date_invoiced); due.setDate(due.getDate() + 30);
    return due < new Date();
  }).length;

  // Upcoming payments (invoices sent but unpaid, sorted by date)
  const upcoming = [...invoices]
    .filter(i => i.status === 'sent' || i.status === 'unpaid')
    .sort((a,b) => (a.date_invoiced||'') > (b.date_invoiced||'') ? 1 : -1)
    .slice(0,5);

  c.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card indigo"><div class="label">Total Invoiced</div><div class="value">${fmt(totalInvoiced)}</div><div class="sub">${invoices.length} invoice${invoices.length!==1?'s':''}</div></div>
      <div class="kpi-card green"><div class="label">Total Received</div><div class="value">${fmt(totalPaid)}</div><div class="sub">${invoices.filter(i=>i.status==='paid').length} paid</div></div>
      <div class="kpi-card amber"><div class="label">Outstanding</div><div class="value">${fmt(outstanding)}</div><div class="sub">${invoices.filter(i=>!['paid','cancelled'].includes(i.status)).length} open</div></div>
      <div class="kpi-card red"><div class="label">Overdue</div><div class="value">${overdue}</div><div class="sub">invoices past 30 days</div></div>
    </div>

    <div class="charts-row">
      <div class="chart-card"><h3>Invoice Status Breakdown</h3><div class="chart-wrap"><canvas id="ch-status"></canvas></div></div>
      <div class="chart-card"><h3>Revenue by Project</h3><div class="chart-wrap"><canvas id="ch-proj"></canvas></div></div>
    </div>

    <div class="table-card">
      <div class="table-toolbar" style="background:var(--gray-50);padding:12px 16px;">
        <span style="font-size:.85rem;font-weight:600;color:var(--gray-700);">Recent Invoices</span>
      </div>
      <table>
        <thead><tr><th>Invoice #</th><th>Project</th><th>Owner</th><th>Date Invoiced</th><th>Amount</th><th>Status</th><th>Date Paid</th></tr></thead>
        <tbody>
          ${invoices.slice(0,8).map(i => `<tr>
            <td><strong>${i.invoice_number||'—'}</strong></td>
            <td>${projectName(i.project_id)}</td>
            <td>${i.owner||'—'}</td>
            <td>${fmtDate(i.date_invoiced)}</td>
            <td><strong>${fmt(i.invoice_amount)}</strong></td>
            <td>${statusBadge(i.status)}</td>
            <td>${fmtDate(i.date_paid)}</td>
          </tr>`).join('')}
          ${invoices.length===0?'<tr><td colspan="7" class="no-data">No invoices yet</td></tr>':''}
        </tbody>
      </table>
    </div>
  `;

  // Charts
  destroyCharts();
  // Status doughnut
  const statuses = ['draft','sent','paid','overdue','cancelled'];
  const statusColors = ['#9ca3af','#60a5fa','#34d399','#f87171','#d1d5db'];
  const statusCounts = statuses.map(s => invoices.filter(i => i.status===s).length);
  charts['status'] = new Chart(document.getElementById('ch-status'), {
    type: 'doughnut',
    data: { labels: statuses.map(s=>s.charAt(0).toUpperCase()+s.slice(1)), datasets: [{ data: statusCounts, backgroundColor: statusColors, borderWidth: 2 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ boxWidth:12, font:{size:11} } } } }
  });

  // Revenue by project bar
  const projRevenue = projects.map(p => ({
    name: p.name,
    total: invoices.filter(i => i.project_id===p.id && i.status==='paid').reduce((s,i) => s+fmtNum(i.invoice_amount), 0)
  })).sort((a,b) => b.total-a.total).slice(0,8);
  charts['proj'] = new Chart(document.getElementById('ch-proj'), {
    type: 'bar',
    data: {
      labels: projRevenue.map(p => p.name),
      datasets: [{ label: 'Paid ($)', data: projRevenue.map(p => p.total), backgroundColor: '#818cf8', borderRadius: 5 }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ ticks:{ callback: v => '$'+v.toLocaleString() } } } }
  });
}

function destroyCharts() {
  Object.values(charts).forEach(ch => { try { ch.destroy(); } catch(e){} });
  charts = {};
}

// ── INVOICES ──────────────────────────────────────────────────────────────────
function renderInvoices(c, acts) {
  acts.innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="exportInvoicesExcel()">⬇ Excel</button>
    <button class="btn btn-secondary btn-sm" onclick="exportInvoicesPDF()">⬇ PDF</button>

                ${i.status==='pending_approval'?`<button class="btn btn-success btn-sm" onclick="approveInvoice('${i.id}')">✓ Approve</button><button class="btn btn-danger btn-sm" onclick="rejectInvoice('${i.id}')">✕ Reject</button>`:''}

      <div class="pagination">
        <span>Page ${invPage} of ${Math.max(1,Math.ceil(filtered.length/PAGE_SIZE))}</span>
        <div style="display:flex;gap:6px">
          <button ${invPage<=1?'disabled':''} onclick="invPage--;rerenderInvoices()">← Prev</button>
          <button ${invPage>=Math.ceil(filtered.length/PAGE_SIZE)?'disabled':''} onclick="invPage++;rerenderInvoices()">Next →</button>
        </div>
      </div>
    </div>
  `;
}

function filterInvoices() {
  return invoices.filter(i => {
    const s = (invSearch||'').toLowerCase();
    if (s && !((i.invoice_number||'').toLowerCase().includes(s) || projectName(i.project_id).toLowerCase().includes(s) || (i.owner||'').toLowerCase().includes(s) || (i.notes||'').toLowerCase().includes(s))) return false;
    if (invStatus && i.status !== invStatus) return false;
    if (invProject && i.project_id !== invProject) return false;
    if (invDateFrom && (i.date_invoiced||'') < invDateFrom) return false;
    if (invDateTo && (i.date_invoiced||'') > invDateTo) return false;
    return true;
  });
}

function clearInvFilters() { invSearch=''; invStatus=''; invProject=''; invDateFrom=''; invDateTo=''; invPage=1; rerenderInvoices(); }

async function rerenderInvoices() {
  await loadAll();
  const c = document.getElementById('content');

  renderInvoices(c, acts);
}

async function saveInvoice(id) {
  const data = {
    invoice_number: document.getElementById('f-inv-num').value.trim(),
    project_id: document.getElementById('f-inv-proj').value || null,
    owner: document.getElementById('f-inv-owner').value.trim() || null,
    status: document.getElementById('f-inv-status').value,
    date_invoiced: document.getElementById('f-inv-date').value || null,
    invoice_amount: parseFloat(document.getElementById('f-inv-amount').value) || 0,
    date_paid: document.getElementById('f-inv-paid').value || null,
    approver_email: document.getElementById('f-inv-approver').value.trim() || null,
    client_email: document.getElementById('f-inv-client').value.trim() || null,
    notes: document.getElementById('f-inv-notes').value.trim() || null,
  };
  if (!data.invoice_number) { toast('Invoice number is required'); return; }
  let err;
  if (id) {
    ({error: err} = await sb.from('inv_invoices').update(data).eq('id', id));
  } else {
    ({error: err} = await sb.from('inv_invoices').insert(data));
  }
  if (err) { toast('Error: ' + err.message); return; }
  closeModal('inv-modal');
  toast(id ? 'Invoice updated' : 'Invoice created');
  await rerenderInvoices();
}

async function deleteInvoice(id) {
  if (!confirm('Delete this invoice?')) return;
  await sb.from('inv_line_items').delete().eq('invoice_id', id);
  const {error} = await sb.from('inv_invoices').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  toast('Invoice deleted');
  await rerenderInvoices();
}

function selectGenProject(id) {
  // Update radio + card highlight
  document.querySelectorAll('.gen-project-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('gpc-' + id);
  if (card) { card.classList.add('selected'); document.getElementById('gr-' + id).checked = true; }

  const p = projects.find(x => x.id === id);
  if (!p) return;

  // Build service checkboxes
  const upfront = document.getElementById('gen-upfront-checks');
  const monthly = document.getElementById('gen-monthly-checks');

  upfront.innerHTML = UPFRONT_SERVICES.map(svc => {
    const amt = fmtNum(p[svc.key]);
    return `<div class="service-check">
      <label><input type="checkbox" class="gen-svc-chk" data-amount="${amt}" onchange="updateGenTotal()" ${amt>0?'checked':'disabled'}> ${svc.label}</label>
      <span class="svc-amount">${fmt(amt)}</span>
    </div>`;
  }).join('');

  monthly.innerHTML = MONTHLY_SERVICES.map(svc => {
    const amt = fmtNum(p[svc.key]);
    return `<div class="service-check">
      <label><input type="checkbox" class="gen-svc-chk" data-amount="${amt}" onchange="updateGenTotal()" ${amt>0?'checked':'disabled'}> ${svc.label}</label>
      <span class="svc-amount">${fmt(amt)}</span>
    </div>`;
  }).join('');

  document.getElementById('gen-services-section').classList.remove('hidden');
  document.getElementById('gen-inv-owner').value = p.owner || '';
  document.getElementById('gen-save-btn').disabled = false;
  updateGenTotal();
}

function updateGenTotal() {
  const total = [...document.querySelectorAll('.gen-svc-chk:checked')].reduce((s, el) => s + parseFloat(el.dataset.amount||0), 0);
  document.getElementById('gen-total').textContent = fmt(total);
}

async function saveGeneratedInvoice() {
  const projId = document.querySelector('input[name="gen-proj"]:checked')?.value;
  if (!projId) { toast('Select a project'); return; }

  // Collect selected services
  const allSvcs = [...UPFRONT_SERVICES.map(s=>({...s,type:'upfront'})), ...MONTHLY_SERVICES.map(s=>({...s,type:'monthly'}))];
  const p = projects.find(x => x.id === projId);
  const selectedSvcs = [];
  [...document.querySelectorAll('.gen-svc-chk:checked')].forEach((el, idx) => {
    const parent = el.closest('.service-check');
    const label = parent.querySelector('label').textContent.trim();
    selectedSvcs.push({ service_name: label, service_type: el.closest('#gen-monthly-checks') ? 'monthly' : 'upfront', amount: parseFloat(el.dataset.amount) });
  });

  const total = selectedSvcs.reduce((s,x) => s + x.amount, 0);
  const invoiceData = {
    invoice_number: document.getElementById('gen-inv-num').value.trim() || generateInvoiceNumber(),
    project_id: projId,
    owner: document.getElementById('gen-inv-owner').value.trim() || null,
    date_invoiced: document.getElementById('gen-inv-date').value || null,
    invoice_amount: total,
    status: document.getElementById('gen-inv-status').value,
    notes: document.getElementById('gen-inv-notes').value.trim() || null,
  };

  const {data: saved, error} = await sb.from('inv_invoices').insert(invoiceData).select().single();
  if (error) { toast('Error: ' + error.message); return; }

  if (selectedSvcs.length > 0) {
    await sb.from('inv_line_items').insert(selectedSvcs.map(s => ({...s, invoice_id: saved.id})));
  }

  closeModal('gen-modal');
  toast('Invoice created!');
  await loadAll();
  printInvoice(saved.id);
  await rerenderInvoices();
}

function updateProjectTotal() {
  const ut = UPFRONT_SERVICES.reduce((s,svc) => s + (parseFloat(document.getElementById('fp-'+svc.key)?.value)||0), 0);
  const mt = MONTHLY_SERVICES.reduce((s,svc) => s + (parseFloat(document.getElementById('fp-'+svc.key)?.value)||0), 0);
  const uel = document.getElementById('fp-upfront-total');
  const mel = document.getElementById('fp-monthly-total');
  if (uel) uel.textContent = fmt(ut);
  if (mel) mel.textContent = fmt(mt) + '/mo';
}

async function saveProject(id) {
  const name = document.getElementById('fp-name').value.trim();
  if (!name) { toast('Project name is required'); return; }
  const data = {
    name,
    color: document.getElementById('fp-color').value,
    owner: document.getElementById('fp-owner').value.trim() || null,
    start_date: document.getElementById('fp-start').value || null,
    end_date: document.getElementById('fp-end').value || null,
    approver_email: document.getElementById('fp-approver').value.trim() || null,
    client_email: document.getElementById('fp-client').value.trim() || null,
  };
  [...UPFRONT_SERVICES, ...MONTHLY_SERVICES].forEach(svc => {
    data[svc.key] = parseFloat(document.getElementById('fp-'+svc.key)?.value) || 0;
  });
  let err;
  if (id) {
    ({error:err} = await sb.from('inv_projects').update(data).eq('id',id));
  } else {
    ({error:err} = await sb.from('inv_projects').insert(data));
  }
  if (err) { toast('Error: ' + err.message); return; }
  closeModal('proj-modal');
  toast(id ? 'Project updated' : 'Project created');
  await renderView();
}

async function deleteProject(id) {
  if (!confirm('Delete this project? Associated invoices will have their project unlinked.')) return;
  const {error} = await sb.from('inv_projects').delete().eq('id',id);
  if (error) { toast('Error: ' + error.message); return; }
  toast('Project deleted');
  await renderView();
}

function filterReports() {
  return invoices.filter(i => {
    const s = (repSearch||'').toLowerCase();
    if (s && !((i.invoice_number||'').toLowerCase().includes(s) || projectName(i.project_id).toLowerCase().includes(s) || (i.owner||'').toLowerCase().includes(s))) return false;
    if (repStatus && i.status !== repStatus) return false;
    if (repProject && i.project_id !== repProject) return false;
    if (repDateFrom && (i.date_invoiced||'') < repDateFrom) return false;
    if (repDateTo && (i.date_invoiced||'') > repDateTo) return false;
    return true;
  });
}

function clearRepFilters() { repSearch=''; repStatus=''; repProject=''; repDateFrom=''; repDateTo=''; repPage=1; rerenderReports(); }

async function rerenderReports() {
  await loadAll();
  renderReports(document.getElementById('content'), document.getElementById('topbar-actions'));
}

// ── APPROVAL WORKFLOW ─────────────────────────────────────────────────────────
async function submitForApproval(id) {
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;
  if (!inv.approver_email) {
    toast('Add an approver email to this invoice first (Edit → Approver Email)');
    return;
  }
  const approvalToken = genToken();
  const rejectionToken = genToken();
  const {error} = await sb.from('inv_invoices').update({
    status: 'pending_approval',
    approval_token: approvalToken,
    rejection_token: rejectionToken,
  }).eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }

  const proj = projects.find(p => p.id === inv.project_id);
  const approveUrl = `${APP_URL}?approve=${approvalToken}`;
  const rejectUrl  = `${APP_URL}?reject=${rejectionToken}`;

  try {
    await emailjs.send(EJS_SERVICE, EJS_APPROVAL_TEMPLATE, {
      to_email:       inv.approver_email,
      subject:        `Invoice ${inv.invoice_number} requires your approval`,
      invoice_number: inv.invoice_number,
      project_name:   proj?.name || '—',
      owner:          inv.owner || '—',
      date_invoiced:  fmtDate(inv.date_invoiced),
      amount:         fmt(inv.invoice_amount),
      notes:          inv.notes || '',
      approve_url:    approveUrl,
      reject_url:     rejectUrl,
      html_body:      buildApprovalEmailHtml(inv, proj, approveUrl, rejectUrl),
    });
    toast(`Approval request sent to ${inv.approver_email}`);
  } catch(e) {
    toast('Invoice updated but email failed — check EmailJS template IDs');
    console.error(e);
  }
  await rerenderInvoices();
}

async function approveInvoice(id) {
  const {error} = await sb.from('inv_invoices').update({status:'approved'}).eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  toast('Invoice approved ✓');
  await rerenderInvoices();
}

async function rejectInvoice(id) {
  const {error} = await sb.from('inv_invoices').update({status:'rejected'}).eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  toast('Invoice rejected');
  await rerenderInvoices();
}

async function sendToClient(id) {
  await loadAll();
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;
  if (!inv.client_email) {
    toast('Add a client email to this invoice first (Edit → Client Email)');
    return;
  }
  const proj = projects.find(p => p.id === inv.project_id);
  const items = lineItems.filter(l => l.invoice_id === id);
  try {
    await emailjs.send(EJS_SERVICE, EJS_CLIENT_TEMPLATE, {
      to_email:       inv.client_email,
      subject:        `Invoice ${inv.invoice_number} from Fountayn`,
      invoice_number: inv.invoice_number,
      project_name:   proj?.name || '—',
      owner:          inv.owner || '—',
      date_invoiced:  fmtDate(inv.date_invoiced),
      amount:         fmt(inv.invoice_amount),
      notes:          inv.notes || '',
      html_body:      buildClientEmailHtml(inv, proj, items),
    });
    await sb.from('inv_invoices').update({status:'sent'}).eq('id', id);
    toast(`Invoice sent to ${inv.client_email} ✓`);
  } catch(e) {
    toast('Email failed — check EmailJS template IDs');
    console.error(e);
  }
  await rerenderInvoices();
}

// Handle magic approve/reject links (?approve=TOKEN or ?reject=TOKEN)
async function handleUrlApproval() {
  const params = new URLSearchParams(window.location.search);
  const approveToken = params.get('approve');
  const rejectToken  = params.get('reject');
  if (!approveToken && !rejectToken) return;

  // Clear the URL param immediately
  window.history.replaceState({}, '', window.location.pathname);

  await loadAll();
  if (approveToken) {
    const inv = invoices.find(i => i.approval_token === approveToken);
    if (!inv) { toast('Approval link is invalid or already used'); return; }
    await sb.from('inv_invoices').update({status:'approved', approval_token: null}).eq('id', inv.id);
    toast(`✓ Invoice ${inv.invoice_number} approved! It is now ready to send to the client.`, 5000);
    await rerenderInvoices();
  } else if (rejectToken) {
    const inv = invoices.find(i => i.rejection_token === rejectToken);
    if (!inv) { toast('Rejection link is invalid or already used'); return; }
    await sb.from('inv_invoices').update({status:'rejected', rejection_token: null}).eq('id', inv.id);
    toast(`Invoice ${inv.invoice_number} has been rejected.`, 5000);
    await rerenderInvoices();
  }
}

    <a href="${approveUrl}" style="display:inline-block;background:#10b981;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:.9rem">✓ Approve Invoice</a>
    <a href="${rejectUrl}" style="display:inline-block;background:#ef4444;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:.9rem">✕ Reject Invoice</a>
  </div>
  <p style="font-size:.8rem;color:#9ca3af">This request was sent from Invoice Hub. Clicking Approve or Reject will update the invoice status automatically.</p>
</div>`;
}

function buildClientEmailHtml(inv, proj, items) {
  const upfront = items.filter(l => l.service_type==='upfront');
  const monthly  = items.filter(l => l.service_type==='monthly');
  const lineItemsHtml = items.length > 0 ? `
  <table style="width:100%;border-collapse:collapse;font-size:.875rem;margin-bottom:24px">
    <thead><tr style="background:#f3f4f6"><th style="padding:8px 12px;text-align:left;color:#6b7280;font-size:.75rem;text-transform:uppercase">Service</th><th style="padding:8px 12px;text-align:left;color:#6b7280;font-size:.75rem;text-transform:uppercase">Type</th><th style="padding:8px 12px;text-align:right;color:#6b7280;font-size:.75rem;text-transform:uppercase">Amount</th></tr></thead>
    <tbody>
      ${upfront.length?`<tr><td colspan="3" style="padding:6px 12px;font-weight:600;font-size:.78rem;color:#6b7280;background:#f9fafb">Upfront Build</td></tr>${upfront.map(l=>`<tr><td style="padding:7px 12px">${l.service_name}</td><td style="padding:7px 12px;color:#6b7280">One-time</td><td style="padding:7px 12px;text-align:right">${fmt(l.amount)}</td></tr>`).join('')}`:''}
      ${monthly.length?`<tr><td colspan="3" style="padding:6px 12px;font-weight:600;font-size:.78rem;color:#6b7280;background:#f9fafb">Monthly Recurring</td></tr>${monthly.map(l=>`<tr><td style="padding:7px 12px">${l.service_name}</td><td style="padding:7px 12px;color:#6b7280">Monthly</td><td style="padding:7px 12px;text-align:right">${fmt(l.amount)}</td></tr>`).join('')}`:''}
      <tr style="background:#eef2ff"><td colspan="2" style="padding:10px 12px;font-weight:700">Total</td><td style="padding:10px 12px;text-align:right;font-weight:700;color:#4f46e5">${fmt(inv.invoice_amount)}</td></tr>
    </tbody>
  </table>` : `<p style="font-size:1.5rem;font-weight:700;color:#4f46e5;margin-bottom:24px">${fmt(inv.invoice_amount)}</p>`;

  return `<div style="font-family:-apple-system,sans-serif;max-width:600px;margin:0 auto;padding:32px 24px;color:#111827">
  <div style="margin-bottom:24px"><span style="font-size:1.3rem;font-weight:700;color:#4f46e5">💼 Invoice Hub</span><span style="margin-left:8px;font-size:.85rem;color:#6b7280">Fountayn</span></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px">
    <div><h1 style="font-size:2rem;color:#4f46e5;margin:0 0 4px">INVOICE</h1><div style="font-weight:600">${inv.invoice_number}</div></div>
    <div style="text-align:right;font-size:.875rem;color:#6b7280"><div>Project: <strong style="color:#111">${proj?.name||'—'}</strong></div><div>Date: ${fmtDate(inv.date_invoiced)}</div></div>
  </div>
  ${lineItemsHtml}
  ${inv.notes?`<div style="background:#f9fafb;border-radius:8px;padding:12px 16px;font-size:.875rem;margin-bottom:24px"><strong>Notes:</strong> ${inv.notes}</div>`:''}
  <p style="font-size:.8rem;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:16px">This invoice was sent via Invoice Hub · Fountayn · ${new Date().toLocaleDateString()}</p>
</div>`;
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// Close modal on overlay click
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.remove();
  }
});

const _p = new URLSearchParams(window.location.search);
